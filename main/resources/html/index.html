<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Desktop Girlfriend 配网</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        h1 {
            color: #333;
            text-align: center;
            margin: 0 0 20px 0;
            font-size: 20px;
        }
        h2 {
            color: #555;
            font-size: 16px;
            margin: 0 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #4a90d9;
        }
        .form-group {
            margin-bottom: 12px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            color: #666;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus {
            border-color: #4a90d9;
        }
        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: background-color 0.2s;
        }
        .btn-primary {
            background-color: #4a90d9;
            color: white;
        }
        .btn-primary:hover {
            background-color: #3a7bc8;
        }
        .btn-success {
            background-color: #4caf50;
            color: white;
        }
        .btn-success:hover {
            background-color: #43a047;
        }
        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background-color: #d63a2b;
        }
        .btn-secondary {
            background-color: #95a5a6;
            color: white;
            margin-top: 8px;
        }
        .btn-secondary:hover {
            background-color: #7f8c8d;
        }
        #status {
            margin-top: 12px;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            color: #0c5460;
        }
        .wifi-list {
            margin-bottom: 12px;
            max-height: 240px;
            overflow-y: auto;
            border: 1px solid #eee;
            border-radius: 6px;
        }
        .wifi-item {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.15s;
        }
        .wifi-item:last-child {
            border-bottom: none;
        }
        .wifi-item:hover {
            background-color: #f5f8fc;
        }
        .wifi-item:active {
            background-color: #e8eef5;
        }
        .wifi-name {
            flex-grow: 1;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .lock-icon {
            margin-right: 8px;
            font-size: 14px;
        }
        .wifi-signal {
            margin-left: 10px;
            color: #999;
            font-size: 12px;
            flex-shrink: 0;
        }
        .hidden {
            display: none;
        }
        .connection-info {
            margin-bottom: 16px;
            padding: 16px;
            background-color: #e8f5e9;
            border-radius: 8px;
        }
        .connection-info h2 {
            color: #2e7d32;
            border-bottom-color: #66bb6a;
        }
        .connection-info p {
            margin: 6px 0;
            font-size: 14px;
            color: #333;
        }
        .scan-hint {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }
        .scan-spinner {
            text-align: center;
            padding: 20px;
            color: #4a90d9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Desktop Girlfriend 配网</h1>

        <!-- 已连接信息 -->
        <div id="connectionInfo" class="connection-info hidden">
            <h2>当前连接</h2>
            <p>WiFi名称: <strong id="connectedSSID"></strong></p>
            <p>IP地址: <strong id="connectedIP"></strong></p>
            <button id="disconnectBtn" class="btn-danger">断开连接</button>
        </div>

        <!-- 扫描按钮 -->
        <button id="refreshBtn" class="btn-success">扫描WiFi</button>

        <!-- WiFi列表 -->
        <div id="wifiList" class="wifi-list"></div>

        <!-- 密码输入表单 -->
        <form id="wifiForm" class="hidden">
            <div class="form-group">
                <label for="ssid">WiFi名称:</label>
                <input type="text" id="ssid" name="ssid" readonly>
            </div>
            <div class="form-group">
                <label for="password">WiFi密码:</label>
                <input type="password" id="password" name="password" required
                       placeholder="请输入密码">
            </div>
            <button type="submit" class="btn-primary">连接</button>
            <button type="button" id="cancelBtn" class="btn-secondary">取消</button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        var wifiList = document.getElementById('wifiList');
        var wifiForm = document.getElementById('wifiForm');
        var ssidInput = document.getElementById('ssid');
        var passwordInput = document.getElementById('password');
        var refreshBtn = document.getElementById('refreshBtn');
        var cancelBtn = document.getElementById('cancelBtn');
        var statusEl = document.getElementById('status');
        var connectionInfo = document.getElementById('connectionInfo');
        var connectedSSID = document.getElementById('connectedSSID');
        var connectedIP = document.getElementById('connectedIP');
        var disconnectBtn = document.getElementById('disconnectBtn');
        var statusTimer = null;
        var isConnecting = false;

        /* 显示状态消息 */
        function showStatus(msg, type) {
            statusEl.className = type || '';
            statusEl.textContent = msg;
        }

        /* 清除状态消息 */
        function clearStatus() {
            statusEl.className = '';
            statusEl.textContent = '';
        }

        /* 扫描WiFi列表 */
        function refreshWifiList() {
            wifiList.innerHTML = '<div class="scan-spinner">正在扫描...</div>';
            refreshBtn.disabled = true;

            fetch('/scan')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    wifiList.innerHTML = '';
                    if (data.length === 0) {
                        wifiList.innerHTML = '<div class="scan-hint">未找到WiFi网络</div>';
                    } else {
                        data.forEach(function(wifi) {
                            var div = document.createElement('div');
                            div.className = 'wifi-item';

                            var lockSpan = document.createElement('span');
                            lockSpan.className = 'lock-icon';
                            lockSpan.textContent = wifi.auth ? '🔒' : '';

                            var nameSpan = document.createElement('span');
                            nameSpan.className = 'wifi-name';
                            nameSpan.textContent = wifi.ssid;

                            var signalSpan = document.createElement('span');
                            signalSpan.className = 'wifi-signal';
                            signalSpan.textContent = wifi.rssi + 'dBm';

                            div.appendChild(lockSpan);
                            div.appendChild(nameSpan);
                            div.appendChild(signalSpan);
                            div.onclick = function() { selectWifi(wifi.ssid); };
                            wifiList.appendChild(div);
                        });
                    }
                    clearStatus();
                    refreshBtn.disabled = false;
                })
                .catch(function(error) {
                    wifiList.innerHTML = '';
                    showStatus('扫描失败: ' + error.message, 'error');
                    refreshBtn.disabled = false;
                });
        }

        /* 选择WiFi */
        function selectWifi(ssid) {
            ssidInput.value = ssid;
            wifiForm.classList.remove('hidden');
            passwordInput.value = '';
            passwordInput.focus();
            clearStatus();
        }

        /* 取消选择 */
        cancelBtn.onclick = function() {
            wifiForm.classList.add('hidden');
            clearStatus();
        };

        /* 检查连接状态 */
        function checkStatus() {
            fetch('/status')
                .then(function(response) { return response.json(); })
                .then(function(data) {
                    if (data.connected) {
                        /* 已连接 */
                        connectionInfo.classList.remove('hidden');
                        wifiList.classList.add('hidden');
                        wifiForm.classList.add('hidden');
                        refreshBtn.classList.add('hidden');
                        connectedSSID.textContent = data.ssid;
                        connectedIP.textContent = data.ip;

                        if (isConnecting) {
                            showStatus('连接成功！', 'success');
                            isConnecting = false;
                            stopStatusPolling();
                        }
                    } else {
                        /* 未连接 */
                        connectionInfo.classList.add('hidden');
                        wifiList.classList.remove('hidden');
                        refreshBtn.classList.remove('hidden');

                        if (isConnecting) {
                            if (data.connecting) {
                                showStatus(data.message || '正在连接...', 'info');
                            } else {
                                /* 连接失败 */
                                isConnecting = false;
                                stopStatusPolling();
                                showStatus(data.message || '连接失败，请重试', 'error');
                                wifiForm.classList.remove('hidden');
                                passwordInput.value = '';
                                passwordInput.focus();
                            }
                        }
                    }
                })
                .catch(function() {
                    /* 网络错误（设备可能正在切换模式） */
                });
        }

        /* 启动状态轮询 */
        function startStatusPolling() {
            stopStatusPolling();
            statusTimer = setInterval(checkStatus, 2000);
        }

        /* 停止状态轮询 */
        function stopStatusPolling() {
            if (statusTimer) {
                clearInterval(statusTimer);
                statusTimer = null;
            }
        }

        /* 连接WiFi */
        wifiForm.onsubmit = function(e) {
            e.preventDefault();
            showStatus('正在连接...', 'info');
            wifiForm.classList.add('hidden');
            isConnecting = true;

            fetch('/connect', {
                method: 'POST',
                body: JSON.stringify({
                    ssid: ssidInput.value,
                    password: passwordInput.value
                })
            })
            .then(function(response) {
                if (response.ok) {
                    startStatusPolling();
                } else {
                    return response.text().then(function(text) {
                        throw new Error(text);
                    });
                }
            })
            .catch(function(error) {
                isConnecting = false;
                showStatus('连接请求失败: ' + error.message, 'error');
                wifiForm.classList.remove('hidden');
            });
        };

        /* 扫描按钮 */
        refreshBtn.onclick = refreshWifiList;

        /* 断开连接 */
        disconnectBtn.onclick = function() {
            disconnectBtn.disabled = true;
            showStatus('正在断开连接...', 'info');

            fetch('/disconnect', { method: 'POST' })
                .then(function() {
                    /* 等待设备断开后刷新页面状态 */
                    setTimeout(function() {
                        isConnecting = false;
                        stopStatusPolling();
                        connectionInfo.classList.add('hidden');
                        wifiList.classList.remove('hidden');
                        refreshBtn.classList.remove('hidden');
                        showStatus('已断开连接', 'success');
                        disconnectBtn.disabled = false;
                        refreshWifiList();
                    }, 2000);
                })
                .catch(function(error) {
                    showStatus('断开失败: ' + error.message, 'error');
                    disconnectBtn.disabled = false;
                });
        };

        /* 页面加载 */
        document.addEventListener('DOMContentLoaded', function() {
            checkStatus();
            refreshWifiList();
        });
    </script>
</body>
</html>
